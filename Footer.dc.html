<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="./theme.css">
<script src="./va-lang.js?v=3"></script>
</head>
<body>
<x-dc>
<footer style="background:#123044; color:#fff; font-family:Inter,system-ui,sans-serif;">
  <div style="max-width:1200px; margin:0 auto; padding:54px 24px 30px; display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; gap:40px;">
    <div>
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
        <span style="width:34px; height:34px; border-radius:9px; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center;">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 21s-7.5-4.6-7.5-10a4.2 4.2 0 0 1 7.5-2.6A4.2 4.2 0 0 1 19.5 11c0 5.4-7.5 10-7.5 10Z" fill="#c74738"/></svg>
        </span>
        <span style="font-family:Archivo,sans-serif; font-weight:800; font-size:17px;">Venezuela Ayuda</span>
      </div>
      <p style="font-size:14px; line-height:1.6; color:#9fb2c9; max-width:330px; margin:0 0 18px;">A verified bridge between people who want to help and Venezuelan families, organizations and collection centers around the world.</p>
      <div style="display:flex; gap:10px;">
        <span style="width:36px; height:36px; border-radius:9px; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#c8d6e8" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="3.5"/><circle cx="17.5" cy="6.5" r="1" fill="#c8d6e8"/></svg></span>
        <span style="width:36px; height:36px; border-radius:9px; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center;"><svg width="17" height="17" viewBox="0 0 24 24" fill="#c8d6e8"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></span>
        <span style="width:36px; height:36px; border-radius:9px; background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center;"><svg width="17" height="17" viewBox="0 0 24 24" fill="#c8d6e8"><path d="M22 5.8a8.4 8.4 0 0 1-2.4.7 4.2 4.2 0 0 0 1.8-2.3c-.8.5-1.7.8-2.6 1a4.1 4.1 0 0 0-7 3.8A11.7 11.7 0 0 1 3.4 4.6a4.1 4.1 0 0 0 1.3 5.5c-.7 0-1.3-.2-1.9-.5v.1a4.1 4.1 0 0 0 3.3 4 4.1 4.1 0 0 1-1.8.1 4.1 4.1 0 0 0 3.8 2.9A8.3 8.3 0 0 1 2 18.6a11.7 11.7 0 0 0 6.3 1.9c7.6 0 11.7-6.3 11.7-11.7v-.5c.8-.6 1.5-1.3 2-2.5Z"/></svg></span>
      </div>
    </div>
    <sc-for list="{{ columns }}" as="col" hint-placeholder-count="3">
      <div>
        <div style="font-size:12.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:#5e7a99; margin-bottom:14px;">{{ col.title }}</div>
        <sc-for list="{{ col.items }}" as="it" hint-placeholder-count="4">
          <a href="{{ it.href }}" style="display:block; font-size:14px; color:#c8d6e8; text-decoration:none; padding:6px 0;">{{ it.label }}</a>
        </sc-for>
      </div>
    </sc-for>
  </div>
  <div style="max-width:1200px; margin:0 auto; padding:20px 24px 40px; border-top:1px solid rgba(255,255,255,.08); display:flex; flex-wrap:wrap; gap:14px; justify-content:space-between; align-items:center;">
    <span style="font-size:13px; color:#7f93ab;">© 2026 Venezuela Ayuda · A nonprofit relief network</span>
    <div style="display:flex; gap:20px; font-size:13px;">
      <a href="#" style="color:#7f93ab; text-decoration:none;">Privacy Policy</a>
      <a href="#" style="color:#7f93ab; text-decoration:none;">Terms</a>
      <a href="admin.html" style="color:#7f93ab; text-decoration:none;">Admin</a>
    </div>
  </div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:420}}">
class Component extends DCLogic {
  renderVals() {
    return {
      columns: [
        { title: "Get Involved", items: [
          { label: "Donate", href: "donate.html" },
          { label: "Request Help", href: "request-help.html" },
          { label: "Become a Volunteer", href: "volunteers.html" },
          { label: "Become a Partner", href: "#" }
        ]},
        { title: "Explore", items: [
          { label: "Collection Centers", href: "collection-centers.html" },
          { label: "Verified Families", href: "verified-families.html" },
          { label: "Search", href: "search.html" }
        ]},
        { title: "Organization", items: [
          { label: "About", href: "#" },
          { label: "Contact", href: "#" },
          { label: "Emergency contacts", href: "#" },
          { label: "Component library", href: "components.html" }
        ]}
      ]
    };
  }
}
</script>
</body>
</html>
