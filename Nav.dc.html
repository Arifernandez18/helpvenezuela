<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="./theme.css">
<script src="./va-lang.js?v=3"></script>
</head>
<body>
<x-dc>
<div style="position:sticky; top:0; z-index:50; background:rgba(255,255,255,.86); backdrop-filter:saturate(180%) blur(14px); border-bottom:1px solid #eceff3; font-family:Inter,system-ui,sans-serif;">
  <div style="max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:13px 24px; gap:20px;">
    <a href="index.html" style="display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0;">
      <span style="width:36px; height:36px; border-radius:10px; background:#0f6b8f; display:flex; align-items:center; justify-content:center;">
        <svg width="19" height="19" viewBox="0 0 24 24"><path d="M12 21s-7.5-4.6-7.5-10a4.2 4.2 0 0 1 7.5-2.6A4.2 4.2 0 0 1 19.5 11c0 5.4-7.5 10-7.5 10Z" fill="#fff"/></svg>
      </span>
      <span style="font-family:Archivo,sans-serif; font-weight:800; font-size:17px; color:#123044; letter-spacing:-.01em;">Venezuela Ayuda</span>
    </a>

    <nav style="display:flex; align-items:center; gap:4px;">
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="6">
        <a href="{{ link.href }}" style="{{ link.style }}">{{ link.label }}</a>
      </sc-for>
    </nav>

    <div style="display:flex; align-items:center; gap:10px; flex-shrink:0;">
      <a href="search.html" aria-label="Search" style="width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#536879; text-decoration:none; border:1px solid #eceff3;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
      </a>
      <button onClick="{{ toggleLang }}" aria-label="Toggle language" style="height:38px; padding:0 13px; border-radius:10px; border:1px solid #eceff3; background:#fff; cursor:pointer; font-family:Inter,sans-serif; font-size:13px; font-weight:600; color:#536879;">
        <span style="{{ enStyle }}">EN</span><span style="color:#cdd3da;"> / </span><span style="{{ esStyle }}">ES</span>
      </button>
      <a href="donate.html" style="height:38px; padding:0 18px; border-radius:10px; background:#c74738; color:#fff; text-decoration:none; display:flex; align-items:center; font-size:14px; font-weight:600; box-shadow:0 4px 12px rgba(214,40,40,.22);">{{ donateLabel }}</a>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:70},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;centers&quot;,&quot;donate&quot;,&quot;families&quot;,&quot;request&quot;,&quot;volunteers&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { lang: (window.VALang && window.VALang.getLanguage()) || "en" };
  componentDidMount() {
    this._onLang = (event) => this.setState({ lang: (event.detail && event.detail.lang) || "en" });
    window.addEventListener("va-language-change", this._onLang);
  }
  componentWillUnmount() {
    if (this._onLang) window.removeEventListener("va-language-change", this._onLang);
  }
  renderVals() {
    const active = this.props.active || "home";
    const en = this.state.lang === "en";
    const items = [
      { id: "centers", href: "collection-centers.html", en: "Collection Centers", es: "Centros" },
      { id: "donate", href: "donate.html", en: "Donate", es: "Donar" },
      { id: "families", href: "verified-families.html", en: "Families", es: "Familias" },
      { id: "request", href: "request-help.html", en: "Request Help", es: "Pedir ayuda" },
      { id: "volunteers", href: "volunteers.html", en: "Volunteer", es: "Voluntariado" }
    ];
    const base = "text-decoration:none; font-size:14.5px; font-weight:500; padding:8px 12px; border-radius:9px; transition:background .15s,color .15s; white-space:nowrap;";
    const links = items.map(it => ({
      label: en ? it.en : it.es,
      href: it.href,
      style: it.id === active
        ? base + "color:#0f6b8f; background:#e7f5fa; font-weight:600;"
        : base + "color:#3a4452;"
    }));
    return {
      links,
      donateLabel: en ? "Donate" : "Donar",
      toggleLang: () => {
        const next = this.state.lang === "en" ? "es" : "en";
        if (window.VALang) window.VALang.setLanguage(next);
        else this.setState({ lang: next });
      },
      enStyle: en ? "color:#123044; font-weight:700;" : "color:#9aa3ad;",
      esStyle: en ? "color:#9aa3ad;" : "color:#123044; font-weight:700;"
    };
  }
}
</script>
</body>
</html>
